ollaboration", "question_en": "Tell me about a time you helped an underperforming peer. What did you do?", "question_cn": "描述一次你帮助表现不佳的同事的经历。你做了什么？", "answer_framework_en": {"situation": "A junior engineer on my team had been missing sprint commitments for three consecutive sprints. His code reviews consistently showed fundamental issues — improper error handling, no unit tests, and tight coupling. The team lead was considering putting him on a performance improvement plan.", "task": "I wanted to help him improve before it escalated. As a senior engineer, I believed the issue was primarily a gap in his understanding of our engineering standards rather than a motivation problem. My goal was to get him back to being a productive team member.", "action": "I asked him for a 1:1 coffee chat, not as a formal mentoring session but as a casual conversation about his experience so far. I learned he had come from a startup where they didn't have code reviews or testing standards. I offered to pair-program with him for one hour each morning for two weeks, focusing specifically on the areas he struggled with. I created a personal coding standards checklist for him to reference before submitting PRs. During pair programming, I explained my thought process on error propagation, testability, and modular design rather than just telling him what to fix. After two weeks, I gradually stepped back — reviewing his PRs with detailed comments but letting him drive the fixes himself.", "result": "After one month, his PR quality improved dramatically. His PRs started passing on the first review cycle. He became one of the more thorough code reviewers on the team. Six months later, he was mentoring two new interns. The team lead canceled the PIP consideration. The pairing approach was adopted as our standard onboarding practice for new team members."}, "answer_framework_cn": {"situation": "团队里一位初级工程师连续三个迭代没有完成迭代承诺。他的代码评审总是发现基础性问题——错误处理不当、没有单元测试、代码耦合严重。团队负责人正考虑让他进入绩效改进计划。", "task": "我想在事情升级之前帮助他改进。作为资深工程师，我相信问题主要是他对我们工程标准的理解不足，而不是态度问题。我的目标是帮助他重新成为高效团队一员。", "action": "我约他喝咖啡聊天，不是正式的指导，而是轻松地聊聊他至今的工作体验。我了解到他来自一个没有代码评审和测试标准的创业公司。我提议连续两周每天早晨花一小时和他结对编程，专门针对他薄弱的环节。我制作了一份个人编码规范清单让他提交PR前参考。结对编程时，我解释自己的思考过程——如何处理错误传播、如何设计可测试的代码、如何做模块化设计，而不只是告诉他改什么。两周后我逐渐退出——详细评论他的PR，但让他自己主导修改。", "result": "一个月后，他的PR质量大幅提升，经常一次通过评审。他成为了团队里最细致的代码评审者之一。六个月后他指导了两名新实习生。团队负责人取消了PIP的考虑。这种结对编程方式后来成为我们团队新人入职的标准实践。"}}, {"id": "bq-006", "category": "Learning & Growth", "question_en": "Describe a time you failed to meet a goal. What happened and what did you learn?", "question_cn": "描述一次你未能达成目标的经历。发生了什么？你学到了什么？", "answer_framework_en": {"situation": "I led a project to migrate our CI/CD pipeline from Jenkins to GitHub Actions. I estimated it would take two weeks based on a surface-level evaluation of our 15 microservices. After one week, I had only completed migration for 3 services, and it was clear I would miss the deadline by at least two more weeks.", "task": "I needed to acknowledge the failure early, reset expectations with stakeholders, and complete the migration correctly without cutting corners.", "action": "I sent a坦诚 update to my manager and the team, admitting my estimate was wrong and explaining why — each service had custom Jenkins pipeline logic that couldn't be simply translated. I provided a revised estimate with weekly checkpoints. I then systematically audited all 15 services and categorized them into three complexity tiers. For the simple ones, I wrote a conversion script. For the complex ones, I worked through them one at a time, documenting each custom case. I also asked a DevOps engineer for a 30-minute review of my approach mid-way, catching one design flaw that would have broken our artifact publishing.", "result": "The migration took 5 weeks total, 3 weeks over my original estimate. But all 15 services were migrated correctly with zero post-migration incidents. More importantly, I developed a personal rule: always break down migration estimates into service-by-service complexity analysis before committing to a timeline. I started adding a 50% buffer to any estimate involving legacy system migration. The DevOps team later adopted my complexity categorization framework for their own migration planning."}, "answer_framework_cn": {"situation": "我主导了一个将CI/CD流水线从Jenkins迁移到GitHub Actions的项目。基于对15个微服务的粗略评估，我估计需要两周。一周后我只完成了3个服务的迁移，显然至少还需要两周才能完成。", "task": "我需要及早承认失败，与干系人重新确认预期，并以正确的方式完成迁移，不能偷工减料。", "action": "我坦诚地向经理和团队更新了情况，承认估时错误并解释了原因——每个服务都有自定义的Jenkins流水线逻辑，无法简单转换。我提供了更新的估时并设置了每周检查点。然后我系统审计了全部15个服务，按复杂度分为三个等级。简单的服务我写了转换脚本，复杂的服务我逐个处理并记录每个自定义案例。我还请一位DevOps工程师在中间审查了我的方案，发现了一个会导致制品发布失败的设计缺陷。", "result": "迁移总共花了5周，比原始估计多了3周。但15个服务全部正确迁移，没有发生一起迁移后事故。更重要的是，我养成了一个个人原则：在承诺时间线之前，一定要逐个服务分析复杂度来分解迁移估时。我开始为任何涉及遗留系统迁移的估时增加50%的缓冲。DevOps团队后来采用我的复杂度分类框架来做自己的迁移规划。"}}, {"id": "bq-007", "category": "Innovation & Impact", "question_en": "Tell me about a time you went above and beyond expectations.", "question_cn": "描述一次你超出预期的表现。", "answer_framework_en": {"situation": "During a quarterly review, I noticed our team's API service had a p99 latency of 800ms — well above the 200ms SLO. The root cause was known: N+1 queries in several GraphQL resolvers. But the team had accepted this as tech debt because fixing it would require refactoring the data access layer.", "task": "I decided to tackle this outside of my assigned sprint work. The expectation was simply to maintain existing features and deliver the current sprint's OKRs. I wanted to prove that the latency issue could be fixed with a focused effort rather than a full rewrite.", "action": "I spent a weekend prototyping a DataLoader-based batching solution for the three most critical resolvers. On Monday, I presented the prototype to the team with benchmark results showing latency dropped from 800ms to 120ms for those specific queries. I volunteered to implement the full solution in my 20% time over the next three sprints. I also built a Grafana dashboard to visualize query-level latency so the team could monitor regressions going forward. When implementing, I added integration tests that failed if any resolver exceeded the 200ms threshold, preventing future regressions.", "result": "The p99 latency dropped from 800ms to 180ms, exceeding our SLO. The improved API response time contributed to a 5% increase in user engagement metrics that quarter. The DataLoader pattern became our standard for new resolvers. The Grafana dashboard was adopted by three other teams. My manager used this as an example in the team all-hands of going beyond the scope of assigned work."}, "answer_framework_cn": {"situation": "在季度复盘时，我注意到我们团队的API服务p99延迟为800ms，远高于200ms的SLO。根本原因是几个GraphQL解析器中的N+1查询问题。但团队已将其视为技术债，因为修复需要重构数据访问层。", "task": "我决定在分配的工作之外解决这个问题。团队的预期只是维护现有功能并交付当前迭代的OKR。我想证明延迟问题可以通过集中精力解决，而无需完全重写。", "action": "我花了一个周末为三个最关键的解析器原型实现了一个基于DataLoader的批处理方案。周一我向团队展示了原型和基准测试结果——那些特定查询的延迟从800ms降到了120ms。我主动提出在未来三个迭代的20%时间里实现完整方案。我还构建了一个Grafana仪表盘来可视化查询级别的延迟，以便团队能持续监控回归。实现时，我加入了集成测试，如果任何解析器超过200ms阈值就会失败，防止未来的回归。", "result": "p99延迟从800ms降到了180ms，超过了我们的SLO。改进的API响应时间该季度为用户参与度指标带来了5%的提升。DataLoader模式成为我们新解析器的标准实践。这个Grafana仪表盘被另外三个团队采用。我的经理在团队全体会议上用这个例子来说明超越分配工作范围的价值。"}}, {"id": "bq-008", "category": "Googleyness & Collaboration", "question_en": "Describe a time you had to collaborate with another team that was working on something similar to what you were doing.", "question_cn": "假设你发现别的团队在做和你们团队一样的事情，如何处理？", "answer_framework_en": {"situation": "In the middle of building a user analytics pipeline, we discovered that another team across the office had been working on a nearly identical pipeline for the past two months. Both teams were approaching it with different tech stacks — we used Apache Beam on Dataflow, they used Spark on Dataproc.", "task": "Two teams building the same thing was a waste of engineering resources. But both teams had committed to delivering within their respective quarterly OKRs, and neither wanted to abandon their work. My task was to find a way to merge efforts without either team feeling their work was wasted.", "action": "I reached out to the other team's tech lead and proposed a joint design review. I prepared a comparison matrix evaluating both approaches on scalability, maintenance cost, team expertise, and integration requirements. During the review, I suggested a pragmatic split: we discovered their pipeline had better handling of real-time streaming, while ours was stronger at batch processing with complex joins. I proposed we merge into a hybrid architecture where their streaming component fed into our batch processing layer, reusing the best parts of both systems. I volunteered to map out the integration points and wrote a shared API contract between the two components. We set up a shared Slack channel and bi-weekly sync meetings.", "result": "The combined pipeline handled both streaming and batch use cases better than either standalone version. Total engineering effort was reduced by about 40% compared to building two separate systems. The merged project shipped on time and both teams contributed to the joint OKR. The two teams continued to collaborate on the infrastructure afterward, establishing a shared ownership model."}, "answer_framework_cn": {"situation": "在构建用户分析管道的途中，我们发现办公室另一个团队过去两个月也在做一个几乎相同的分析管道。两边用的技术栈不同——我们用的是Apache Beam on Dataflow，他们用的是Spark on Dataproc。", "task": "两个团队做同样的事情是对工程资源的浪费。但两个团队都已承诺在各自的季度OKR内交付，谁都不想放弃已有的工作。我的任务是在不让任何一方觉得工作白费的情况下合并双方的努力。", "action": "我联系了对方团队的技术负责人，提议举行联合设计评审。我准备了一个对比矩阵，从可扩展性、维护成本、团队专长和集成需求等方面评估两种方案。评审中我提出了务实的拆分方案：我们发现他们的管道在实时流处理方面更强，而我们在带有复杂关联的批处理方面更优。我建议合并为混合架构——他们的流处理组件输入到我们的批处理层，重用两个系统最好的部分。我主动绘制了集成点并编写了两个组件之间的共享API合约。我们建立了共享群聊和双周同步会议。", "result": "合并后的管道在流处理和批处理用例上都比单独的版本更好。总的工程投入比建造两套独立系统减少了约40%。合并后的项目按时交付，两个团队都为联合OKR做出了贡献。此后两个团队继续在基础设施上合作，建立了共享所有权模式。"}}, {"id": "bq-009", "category": "Learning & Growth", "question_en": "Tell me about a time you learned something new and applied it to your work.", "question_cn": "描述一次你学到了新东西并将其应用到工作中的经历。", "answer_framework_en": {"situation": "Our team was experiencing recurring production incidents where a Redis cluster would hit memory limits during traffic spikes, causing cascading failures across dependent services. The standard approach was to add more Redis nodes, but that was becoming expensive and operationally complex.", "task": "I needed to find a more efficient solution rather than just scaling vertically. I had heard about Redis Bloom Filters but had never used them in production. I decided to deeply learn this data structure and evaluate if it could solve our problem.", "action": "I spent two evenings reading the RedisBloom documentation, academic papers on Bloom Filter theory, and several case studies from large-scale deployments. I prototyped a proof of concept: our cache was storing user session keys that were checked for existence on every request — a textbook use case for Bloom Filters where false positives are acceptable but false negatives are not. I built a simulation using production traffic logs to compare memory usage between our current hash-based approach and Bloom Filters. I also learned about counting Bloom Filters and scaling Bloom Filters to handle our dynamic dataset size. After validating, I wrote a migration guide and presented the benchmarks to the team.", "result": "Implementing Bloom Filters reduced Redis memory usage for session key storage by 95%, from 8GB to 400MB. Request latency for existence checks dropped from 5ms to under 1ms since Bloom Filters use simple hash functions. The solution saved $2,400/month in Redis cluster costs. I later gave a lunch-and-learn presentation on probabilistic data structures, which inspired another team to use HyperLogLog for their unique user counting problem."}, "answer_framework_cn": {"situation": "我们的团队反复遇到生产事故——Redis集群在流量高峰时达到内存上限，导致依赖服务发生级联故障。标准方案是增加Redis节点，但这样既昂贵又增加了运维复杂度。", "task": "我需要找到一个更高效的解决方案，而不是简单垂直扩展。我之前听说过Redis布隆过滤器，但从没在生产中使用过。我决定深入学习这种数据结构并评估它是否能解决我们的问题。", "action": "我花了两个晚上阅读RedisBloom文档、布隆过滤器理论的学术论文以及几个大规模部署的案例研究。我构建了一个概念验证原型：我们的缓存存储用户会话密钥，每次请求都会检查是否存在——这是布隆过滤器的教科书级用例（允许误报但不允许漏报）。我用生产流量日志构建了模拟环境，比较当前基于哈希的方法和布隆过滤器的内存使用情况。我还学习了计数布隆过滤器和可伸缩布隆过滤器以处理动态数据集大小。验证后我编写了迁移指南并向团队展示了基准测试结果。", "result": "实施布隆过滤器将会话密钥存储的Redis内存使用量降低了95%，从8GB降到400MB。存在性检查的请求延迟从5ms降到了1ms以下，因为布隆过滤器只需简单哈希函数。这个方案每月节省了$2,400的Redis集群成本。后来我做了一次关于概率数据结构的午餐学习分享，启发另一个团队用HyperLogLog解决他们的独立用户计数问题。"}}, {"id": "bq-010", "category": "Learning & Growth", "question_en": "What is your biggest weakness and how are you improving it?", "question_cn": "你最大的弱点是什么？你是如何改进的？", "answer_framework_en": {"situation": "Early in my career, I had a tendency to over-engineer solutions. I would design for scale and extensibility that a feature didn't need yet, spending twice the necessary development time. A specific example: I spent two weeks building a plugin-based architecture for a notification system that only had three notification types and no plans to add more.", "task": "I recognized this was hurting my velocity and, in some cases, increasing maintenance burden for the team. I needed to learn to match the sophistication of the solution to the actual requirements.", "action": "I started a practice I call the 'Minimum Viable Architecture' approach. Before writing any code, I force myself to write a short design doc with exactly three sections: Requirements (what must work today), Future Considerations (what might change), and Architecture Decision (my proposed approach with explicit justification for why it's not over-engineered). I share this with a senior engineer for a 10-minute review before I start coding. I also added a personal checklist: 'Am I solving today's problem or next year's problem? Can I refactor this in one day if needed?' I set a personal rule to start with the simplest possible implementation and only add abstraction when I see the same pattern a third time (the Rule of Three).", "result": "My development velocity improved by about 30%. The number of 'over-engineering' comments in my code reviews dropped from frequent to rare. The simpler code was easier for junior engineers to understand and modify. In my performance review, my manager specifically noted improved delivery speed without sacrificing code quality. I now coach other engineers on the same approach when I see them falling into the over-engineering trap."}, "answer_framework_cn": {"situation": "在我职业生涯早期，我倾向于过度设计。我会为一个功能设计当前不需要的扩展性和可伸缩性，花费两倍的必要开发时间。一个具体例子：我花了两周为一个只有三种通知类型且没有添加计划的通知系统构建插件式架构。", "task": "我意识到这损害了我的开发效率，在某些情况下还增加了团队的维护负担。我需要学会让方案的复杂度与实际需求匹配。", "action": "我开始了一个叫做“最小可行架构”的实践。在写任何代码之前，我强迫自己写一个简短的设计文档，只有三个部分：需求（今天必须能工作的）、未来考虑（可能会变的）、架构决策（我提议的方案以及为什么不过度设计的明确理由）。我在编码前会请一位资深工程师花10分钟评审这个文档。我还加了一个个人检查清单：“我在解决今天的问题还是明年问题？如果需要我一个工作日能重构它吗？”我设了一个个人原则：从最简单的实现开始，只有当第三次看到相同模式时才引入抽象（三次法则）。", "result": "我的开发效率提升了约30%。代码评审中“过度设计”的评论从频繁降到几乎没有。更简单的代码让初级工程师更容易理解和修改。在绩效评估中，经理特别提到我在不牺牲代码质量的情况下提升了交付速度。我现在会指导其他工程师使用同样的方法来避免过度设计的陷阱。"}}, {"id": "bq-011", "category": "Handle Ambiguity", "question_en": "Describe a time you had to handle an ambiguous situation with no clear solution.", "question_cn": "描述一次你在没有清晰解决方案的情况下处理模糊问题的经历。", "answer_framework_en": {"situation": "Our team was asked to build a recommendation system for the company's content platform, but the requirements were extremely vague. The product brief was a single paragraph: 'Help users discover content they'll like.' No definition of success metrics, no target latency, no data schema, not even a clear source of training data.", "task": "I needed to turn this ambiguous, one-paragraph brief into a concrete, shippable feature. The challenge was that any direction I chose could be wrong — there was no one to validate against.", "action": "I started by listing all the unknowns and prioritizing which ones to resolve first. I scheduled 15-minute meetings with 5 stakeholders: the PM (to understand business goals), a data scientist (to discuss algorithm options), the infra lead (to understand constraints), a UX designer (to discuss user-facing aspects), and a customer support rep (to hear common user complaints about discovery). From these conversations, I synthesized a one-page proposal with three options at different complexity levels — from simple rule-based tagging to a full collaborative filtering system. I framed the decision as trade-offs between time-to-ship, accuracy, and maintenance cost. After the PM chose the middle option, I built an MVP in two weeks, explicitly stating assumptions and marking them for validation. I set up analytics to measure whether the assumptions held.", "result": "The MVP launched on time. The analytics revealed an unexpected pattern: users engaged more with curated collections than personalized recommendations. We pivoted to focus on editorial curation with algorithmic support, which performed 3x better than either approach alone. The PM used my structured ambiguity-resolution approach as a template for future vague briefs. The feature contributed to a 12% increase in content consumption."}, "answer_framework_cn": {"situation": "团队被要求为公司内容平台构建一个推荐系统，但需求极其模糊。产品需求文档只有一段话：'帮助用户发现他们可能喜欢的内容'。没有定义成功指标、没有目标延迟、没有数据模式，甚至连训练数据来源都不清楚。", "task": "我需要把这个模糊的一段话变成具体可交付的功能。挑战在于我选择的任何方向都可能是错的——没有人可以帮我验证。", "action": "我先列出所有未知项并确定先解决哪些。我约了5位干系人各15分钟的会议：产品经理（了解业务目标）、数据科学家（讨论算法选项）、基础设施负责人（了解约束条件）、UX设计师（讨论用户交互）、以及客服代表（了解用户关于内容发现的常见抱怨）。从这些对话中，我综合了一份一页纸的方案，包含三个不同复杂度的选项——从简单的基于规则的标签系统到完整的协同过滤系统。我把决策描述为交付时间、准确性和维护成本之间的权衡。产品经理选择了中间选项后，我用两周构建了一个MVP，明确标注了其中的假设并等着被验证。我设置了分析来追踪这些假设是否成立。", "result": "MVP按时上线。分析揭示了一个意外的模式：用户更喜欢精选集而非个性化推荐。我们转而专注于编辑策划加上算法支持，效果比任何一种单独方案好3倍。产品经理把我这套结构化的模糊问题解决方法用作文档模板来处理未来的模糊需求。该功能使内容消费量提升了12%。"}}, {"id": "bq-012", "category": "Handle Ambiguity", "question_en": "Tell me about a time you had to manage multiple projects at the same time.", "question_cn": "描述一次你需要同时管理多个项目的经历。", "answer_framework_en": {"situation": "In a given quarter, I was simultaneously responsible for three workstreams: (1) migrating our CI/CD pipeline to a new system, (2) implementing a critical GDPR data deletion feature with a regulatory deadline, and (3) providing on-call support for our production services. Each workstream was time-sensitive and required significant context switching.", "task": "I needed to deliver all three workstreams successfully without burning out or dropping any commitments. I had to figure out how to allocate my time effectively across very different types of work.", "action": "I used time-blocking on my calendar: 9am-12pm for deep work on the GDPR feature (highest priority and external deadline), 1pm-3pm for CI/CD migration (important but more flexible), and the remaining time for on-call tasks and code reviews. I communicated this schedule to my team so they knew when I was interruptible. For the GDPR feature, I broke it into 2-day milestones to track progress tightly. For CI/CD, I automated one part of the migration with a script to reduce manual effort. I also negotiated with my manager to defer a minor feature from the CI/CD workstream to the next quarter to keep the workload manageable. I kept a running priority list on a shared doc and updated it daily.", "result": "All three workstreams were delivered on time. The GDPR feature passed legal compliance audit with zero findings. The CI/CD migration was completed by end of quarter (one workstream item deferred, agreed with manager). On-call SLAs were maintained with no dropped pages. My time-blocking approach was shared with other engineers in the team who were also juggling multiple projects."}, "answer_framework_cn": {"situation": "在一个季度内，我同时负责三个工作流：(1)将CI/CD流水线迁移到新系统，(2)实现一个关键的GDPR数据删除功能且有监管截止日期，(3)为生产服务提供on-call支持。每个工作流都时间紧迫且需要大量上下文切换。", "task": "我需要在不过度疲劳或放弃任何承诺的情况下成功交付这三个工作流。我需要找到如何在截然不同的工作类型之间有效分配时间的方法。", "action": "我在日历上使用了时间块分配：上午9点到12点专注做GDPR功能（最高优先级且有外部截止日期），下午1点到3点做CI/CD迁移（重要但更灵活），剩余时间处理on-call任务和代码评审。我把这个时间安排告诉了团队，让他们知道什么时候可以打扰我。对于GDPR功能，我拆分成2天一个里程碑来紧密追踪进展。对于CI/CD，我用脚本自动化了迁移的一部分来减少手动工作。我还和经理协商将CI/CD工作流的一个次要功能推迟到下个季度以保持工作负载可控。我在共享文档中维护一个动态优先级列表并每天更新。", "result": "三个工作流都按时交付了。GDPR功能通过了法律合规审计，零问题发现。CI/CD迁移在季度末完成（一个工作项按约定推迟）。On-call SLA保持正常，没有遗漏告警。我的时间块分配方法被团队中其他同时处理多个项目的工程师借鉴。"}}, {"id": "bq-013", "category": "Learning & Growth", "question_en": "Tell me about a mistake you made at work and how you handled it.", "question_cn": "描述一次你在工作中犯的错误以及如何处理的。", "answer_framework_en": {"situation": "I accidentally pushed a database migration that dropped a column still being used by a background job. The column was a nullable status flag that I incorrectly assumed was deprecated. The migration ran successfully in production, and the background job started throwing NullPointerExceptions, affecting about 2,000 user records before I noticed the alert 15 minutes later.", "task": "I needed to immediately stop the damage, restore the lost data, and communicate the incident to affected stakeholders. I also needed to ensure this type of mistake couldn't happen again.", "action": "First, I re-ran the migration in reverse to restore the column. Then I identified the affected records by parsing the error logs and ran a data recovery script using database snapshots from 30 minutes before the migration. I wrote a post-mortem documenting the root cause: the migration hadn't been reviewed by anyone who knew about the background job. I also immediately implemented safeguards: I added a CI check that warns if a migration drops a column that still has data, and I changed our process to require migration reviews from at least two engineers — one from the owning team and one from a team that consumes that data. I personally sent an incident summary to the affected product team with the timeline, impact, and remediation steps.", "result": "98% of the affected data was recovered from snapshots. The remaining 2% was manually reconstructed from application logs over two days. No users reported the issue because it was fixed before the next business day. The CI safeguard I implemented caught two similar risky migrations from other teams in the following months. My post-mortem was shared as a case study in the engineering all-hands."}, "answer_framework_cn": {"situation": "我不小心推送了一个删除数据库列的迁移脚本，而该列仍然被一个后台任务使用。这个列是一个可为空的状态标记，我错误地认为已经废弃了。迁移在生产环境成功执行，然后后台任务开始抛出空指针异常，在我15分钟后注意到告警之前影响了大约2000条用户记录。", "task": "我需要立即止损，恢复丢失的数据，并向受影响的干系人通报事件。我还需要确保此类错误不再发生。", "action": "首先，我反向执行迁移恢复了列。然后我通过解析错误日志找到受影响的记录，用迁移前30分钟的数据库快照运行了数据恢复脚本。我写了一份事后复盘记录根本原因：迁移没有被了解该后台任务的人审查过。我立即实施了安全措施：加入了CI检查，在迁移删除一个仍有数据的列时会发出警告；我还修改了流程，要求迁移必须由至少两名工程师审查——一个来自拥有该数据的团队，另一个来自消费该数据的团队。我亲自向受影响的产品团队发送了事件摘要，包括时间线、影响和修复步骤。", "result": "98%的受影响数据从快照恢复。剩余2%在两天内通过应用程序日志手动重建。没有用户报告该问题，因为在下一个工作日之前就修复了。我实施的CI检查在接下来的几个月里捕获了其他团队两个类似的危险迁移。我的事后复盘被作为案例研究在全工程会议上分享。"}}, {"id": "bq-014", "category": "Googleyness & Collaboration", "question_en": "Tell me about a time you disagreed with a senior colleague or stakeholder and how you handled it.", "question_cn": "描述一次你与资深同事或上级产生分歧的经历以及如何处理。", "answer_framework_en": {"situation": "A principal engineer proposed using a custom-built task queue system for our data processing pipeline. He had already written a proof of concept and was championing it. I had evaluated it and found significant issues: it lacked persistence guarantees, monitoring, and would require ongoing maintenance. I believed we should use an existing solution like RabbitMQ or AWS SQS instead.", "task": "I needed to challenge a more senior engineer's proposal without undermining his authority or making the disagreement personal. The goal was to ensure we made the best technical decision for the long term.", "action": "I scheduled a private 1:1 with the principal engineer first. I framed the conversation as 'I'd love to understand your reasoning better' rather than 'I disagree.' I learned that his primary motivation was avoiding external dependencies due to a past incident where AWS SQS had caused us problems. I acknowledged his concern was valid. Then I prepared a side-by-side comparison of his custom solution vs. SQS, evaluating each on 7 dimensions including durability, throughput, operational cost, and team onboarding time. I also researched and proposed a compromise: using RabbitMQ with a persistent disk configuration that addressed his availability concerns while avoiding the maintenance burden of custom code. I presented this during a design review, making sure to credit his prototype for validating the requirements.", "result": "The team adopted RabbitMQ. The principal engineer admitted later that his prototype was not production-ready and appreciated the thorough evaluation. More importantly, he started including me in architecture discussions going forward. The pipeline ran in production for 2+ years with minimal maintenance. The pattern of 'private alignment then public presentation' became my standard approach for handling technical disagreements."}, "answer_framework_cn": {"situation": "一位首席工程师提议为我们的数据处理管道使用自定义构建的任务队列系统。他已经写好了原型并正在推动这个方案。我评估后发现重大问题：缺乏持久性保证、没有监控、需要持续维护。我认为应该使用RabbitMQ或AWS SQS等现有方案。", "task": "我需要质疑一位更资深工程师的方案，但不能削弱他的权威或让分歧变成个人问题。目标是为长期做出最好的技术决定。", "action": "我先约了首席工程师私下1对1交流。我把对话框架定为“我想更好地理解你的想法”而不是“我不同意”。我了解到他主要动机是避免外部依赖——过去AWS SQS曾给我们带来过问题。我承认他的顾虑是有道理的。然后我准备了一份两种方案的逐项对比，从7个维度评分，包括持久性、吞吐量、运维成本和团队上手时间。我还研究并提出了折中方案：使用带持久磁盘配置的RabbitMQ，既解决了他对可用性的担忧，又避免了自定义代码的维护负担。我在设计评审上展示时，特别肯定了他的原型在验证需求方面的价值。", "result": "团队采用了RabbitMQ。首席工程师后来承认他的原型还不足以投入生产使用，并感谢我做的全面评估。更重要的是，他此后开始让我参与架构讨论。这套“先私下对齐、后公开呈现”的模式成为我处理技术分歧的标准方法。"}}, {"id": "bq-015", "category": "Googleyness & Collaboration", "question_en": "Describe a time there was a dispute over credit or recognition and how you handled it.", "question_cn": "描述一次出现功劳归属争议的经历以及你如何处理。", "answer_framework_en": {"situation": "Our team shipped a significant performance optimization that reduced database costs by 30%. Three people contributed: a junior engineer wrote the initial prototype, a data engineer provided the query analysis, and I architected the caching layer. When the VP praised the project in a company all-hands, they only mentioned my name and the data engineer's, overlooking the junior engineer's contribution.", "task": "The junior engineer was visibly demoralized after the all-hands. I felt responsible because I had provided the project update to the VP that was used in the presentation. I needed to correct the recognition gap without making it seem like the VP had made a mistake publicly.", "action": "I first spoke privately with the junior engineer to acknowledge the oversight and make sure he knew his contribution was valued by me and the team. Then I sent a follow-up email to the VP and the project stakeholders, framing it as 'I want to make sure the full story is known.' I explicitly called out the junior engineer's prototype work as the critical first step that made the project viable. I also suggested the VP mention him in a follow-up communication. Additionally, when the company published the case study on the internal wiki, I made sure the junior engineer was listed as a co-author and his prototype was highlighted.", "result": "The VP sent a follow-up email to the department specifically acknowledging the junior engineer's contribution. The junior engineer gained visibility across the organization, which helped him get promoted the next cycle. The team adopted a norm of always co-authoring project updates as a group before sending them up. I personally learned to be more proactive about highlighting individual contributions when reporting upward."}, "answer_framework_cn": {"situation": "我们团队完成了一个重大的性能优化，将数据库成本降低了30%。三个人做出了贡献：一位初级工程师写了初始原型，一位数据工程师提供了查询分析，我设计了缓存层。当VP在全员大会上表扬这个项目时，只提了我和数据工程师的名字，忽略了初级工程师的贡献。", "task": "那位初级工程师在会后明显很沮丧。我觉得自己有责任，因为我给VP提供了用于演讲的项目更新。我需要纠正这个认可偏差，但不能让VP看起来像是公开发错了言。", "action": "我先私下和初级工程师谈了谈，承认了这个疏忽，确保他知道我和团队都重视他的贡献。然后我给VP和项目干系人发了一封跟进邮件，措辞是“我想确保完整的故事被了解”。我明确指出了初级工程师的原型工作是使项目可行的关键第一步。我还建议VP在后续沟通中提及他。另外，当公司在内部维基上发布案例研究时，我确保初级工程师被列为合著者，他的原型被突出展示。", "result": "VP给部门发了一封跟进邮件，专门肯定了初级工程师的贡献。这位初级工程师在整个组织里获得了曝光度，帮助他在下一个周期获得了晋升。团队建立了一个规范：在向上汇报前，总是以团队形式共同撰写项目更新。我个人也学到了在向上汇报时要更主动地突出个人贡献。"}}, {"id": "bq-016", "category": "Leadership & Ownership", "question_en": "What would you want to work on at Google and why?", "question_cn": "如果你在谷歌工作，你想做什么？为什么？", "answer_framework_en": {"situation": "I've been following Google's work on large-scale distributed systems and developer productivity infrastructure. Specifically, I'm interested in the internal tools and platforms that enable engineers to move fast safely.", "task": "I want to identify a specific area where my experience aligns with Google's needs and where I can make the most impact.", "action": "I would focus on improving developer velocity in the cloud infrastructure division. At my current company, I built an internal developer platform that reduced service setup time from weeks to hours. Google's monorepo and Borg infrastructure solve different problems, but the core challenge is the same: how do you enable thousands of engineers to deploy code safely and quickly? I would start by understanding Google's existing toolchain (Blaze, critique, Rapid etc.), identify friction points through user interviews with other engineers, and then iterate on improvements. I'd specifically want to work on providing faster feedback loops in CI/CD, because I believe reducing iteration time is the single highest-leverage investment for engineering productivity.", "result": "I believe my experience in developer productivity would allow me to contribute from day one while learning from the best in the world at this scale. In the long run, I hope to own a critical piece of Google's internal infrastructure and mentor other engineers on building high-leverage developer tools."}, "answer_framework_cn": {"situation": "我一直在关注Google在大规模分布式系统和开发者生产力基础设施方面的工作。具体来说，我对那些能让工程师快速安全前进的内部工具和平台感兴趣。", "task": "我想找到我的经验与Google需求相符、且能发挥最大影响力的具体领域。", "action": "我会专注于改善云基础设施部门的开发者开发效率。在我现在的公司，我构建了一个内部开发者平台，将服务搭建时间从几周缩短到几小时。Google的monorepo和Borg基础设施解决的是不同的问题，但核心挑战是一样的：如何让数千名工程师安全快速地部署代码。我会先理解Google现有的工具链（Blaze、critique、Rapid等），通过与其他工程师的用户访谈发现痛点，然后迭代改进。我特别想加快CI/CD中的反馈循环，因为我相信缩短迭代时间是提高工程生产力的最高杠杆投资。", "result": "我相信我在开发者生产力方面的经验能让我从第一天起就做出贡献，同时向这个领域全球最顶尖的人学习。长期来看，我希望拥有Google内部基础设施的关键部分，并指导其他工程师构建高杠杆的开发者工具。"}}, {"id": "bq-017", "category": "Leadership & Ownership", "question_en": "What keeps you motivated and passionate about your work?", "question_cn": "什么让你对工作保持热情？", "answer_framework_en": {"situation": "After five years in the same company, I noticed a pattern: my motivation dipped when I was doing maintenance work for extended periods and peaked when I was building something new that directly helped users.", "task": "I wanted to understand what specifically drove my passion and structure my work to maintain that motivation over the long term.", "action": "I started keeping a simple weekly log tracking which activities energized me and which drained me. After three months, I identified three key drivers: (1) seeing my code shipped to real users and hearing positive feedback, (2) solving hard technical problems with elegant solutions, and (3) helping teammates grow through mentoring. I used this data to shape my role: I volunteered for user-facing feature work, I started a weekly 'ask-me-anything' tech session for junior engineers, and I took on refactoring projects that had clear technical depth. When I felt my motivation slipping on a particular task, I would reconnect with the user impact by reading user feedback or support tickets related to that feature.", "result": "This self-awareness helped me maintain consistent motivation over time. The AMA sessions became a team institution that I ran for over a year. My manager noticed the consistency and trusted me with more challenging projects. I believe this discipline of understanding what drives you is even more important at a place like Google, where you have the autonomy to shape your role."}, "answer_framework_cn": {"situation": "在同一家公司五年后，我注意到一个模式：长时间做维护工作时动力下降，而构建能直接帮助用户的新东西时动力达到顶峰。", "task": "我想理解具体是什么驱动了我的热情，并合理安排工作以长期保持这种动力。", "action": "我开始记录每周的活动日志，追踪哪些活动让我精力充沛、哪些让我疲惫。三个月后我发现了三个关键驱动力：(1)看到我的代码交付给真实用户并收到正面反馈，(2)用优雅的方案解决困难的技术问题，(3)通过指导帮助队友成长。我用这些数据来塑造我的角色：主动承担面向用户的功能开发，为初级工程师启动每周技术问答，参与具有明确技术深度的重构项目。当对某个任务动力不足时，我会通过阅读用户反馈或相关工单重新连接用户影响。", "result": "这种自我认知帮助我长期保持稳定的动力。技术问答会成为团队固定活动，我主持了一年多。经理注意到了这种稳定性，交给我更有挑战性的项目。我相信这种理解自身驱动因素的纪律在Google这样的地方更加重要，因为你有自主权来塑造自己的角色。"}}, {"id": "bq-018", "category": "Leadership & Ownership", "question_en": "What is your greatest achievement outside of work?", "question_cn": "你在工作之外最大的成就是什么？", "answer_framework_en": {"situation": "During the pandemic, I organized a volunteer tutoring program that paired software engineers with high school students from under-resourced schools to teach introductory programming. I started it after a conversation with a friend who was a teacher and mentioned many of her students had no access to computer science education.", "task": "I needed to recruit volunteer engineers (who were also working from home and burned out), develop a curriculum that was accessible to students with no prior coding experience, and maintain engagement over a full semester.", "action": "I started by recruiting 5 engineer friends as the founding tutor group. I designed a 10-week curriculum using Python and Replit so students didn't need to install anything. For each session, I wrote a detailed lesson plan and paired one tutor with 2-3 students for hands-on practice. When I realized students were dropping out after week 3, I added a final project showcase where students could build something personally meaningful — a quiz game, a simple website, or a data visualization of something they cared about. I handled all the coordination, scheduling, and parent communication myself. I also set up a mentor chat group where students could ask questions between sessions.", "result": "The program ran for 3 semesters and taught 45 students. 12 of them chose to study computer science in college and 3 credited the program with changing their career path. After the first semester, I handed over the coordination to another volunteer and the program continued. This experience taught me project management, stakeholder alignment, and the importance of creating personal meaning in educational contexts — all of which translate to how I approach building inclusive engineering cultures."}, "answer_framework_cn": {"situation": "疫情期间，我组织了一个志愿者辅导项目，将软件工程师与资源不足学校的高中生结对，教授编程入门。起因是我和一个当老师的朋友聊天，她说很多学生根本没有机会接触计算机科学教育。", "task": "我需要招募志愿者工程师（当时他们也在家工作且精疲力竭），制定无编程经验学生也能掌握的课程，并在整个学期内保持参与度。", "action": "我先招募了5位工程师朋友作为创始导师团队。我设计了10周的课程，使用Python和Replit，这样学生无需安装任何软件。每节课我写详细的教案，一位导师带2-3个学生做动手练习。发现第三周后学生开始流失，我增加了期末项目展示环节，学生可以构建对他们个人有意义的东西——一个问答游戏、一个简单网站、或一个关于他们关心话题的数据可视化。我负责所有协调、排课和家长沟通。我还建立了一个导师聊天群，学生在课间可以提问。", "result": "该项目运行了三个学期，教授了45名学生。其中12人选择在大学学习计算机科学，3人认为这个项目改变了他们的职业道路。第一学期后我把协调工作交给了另一位志愿者，项目得以继续。这次经历教会了我项目管理、干系人协调以及在教育中创造个人意义的重要性——这些都转化到我建立包容性工程文化的方法中。"}}, {"id": "bq-019", "category": "Googleyness & Collaboration", "question_en": "Tell me about a time a colleague was not cooperative. How did you handle it?", "question_cn": "描述一次同事不积极配合的经历。你是怎么处理的？", "answer_framework_en": {"situation": "I needed code review sign-off from a senior engineer on the security team to deploy a critical security patch. His average review turnaround time was 5 days, and I needed it within 24 hours. Multiple pings and Slack messages went unanswered for two days.", "task": "I needed to get the review done quickly without damaging the relationship or escalating prematurely. The security patch had a deadline and was blocking our release.", "action": "Instead of continuing to ping or escalate to his manager, I walked over to his desk and asked if he had 5 minutes. I started by acknowledging his workload: 'I know you're stretched thin, and I don't want to add to your stress.' Then I explained why this review was urgent — not just another PR but a security vulnerability that affected his team's own systems. I offered to do a synchronous walk-through: I opened the diff on my laptop and walked him through the changes in 10 minutes, explaining the security context and the trade-offs I made. This way, he didn't need to context-switch on his own time. I also asked if there was a process change I could make to reduce similar urgency in the future.", "result": "The PR was reviewed and approved that same day. The patch deployed on schedule. The engineer and I had a better working relationship afterward — he started responding to my reviews faster. I also learned a lesson: synchronous walk-throughs are far more effective than passive pings for urgent reviews. Based on this, I proposed and implemented a 'critical path' label in our review system that sets an SLA of 4 hours for security-related reviews."}, "answer_framework_cn": {"situation": "我需要安全团队一位资深工程师的代码评审署名才能部署一个关键安全补丁。他的平均评审周转时间是5天，而我需要在24小时内完成。多次ping和Slack消息两天没有回应。", "task": "我需要在不损害关系或过早升级问题的情况下快速完成评审。安全补丁有截止日期，并且阻塞了我们的发布。", "action": "我没有继续ping或向他的经理升级，而是走到他工位前问是否方便5分钟。我先表示理解他的工作负担：“我知道你很忙，不想给你增加压力。”然后我解释了这个评审为什么紧急——不只是另一个PR，而是影响他自己团队系统的安全漏洞。我提议同步走查：我打开笔记本电脑上的diff，10分钟内带他过了一遍修改，说明了安全上下文和我做的权衡。这样他不需要用自己的时间做上下文切换。我还问他我以后可以做怎样的流程改进来减少这种紧急情况。", "result": "PR当天就评审通过了。补丁按时部署。之后我和这位工程师的工作关系更好了——他开始更快地响应我的评审。我也学到了一课：对于紧急评审，同步走查远比被动ping更有效。基于此，我在评审系统中提出并实施了一个“关键路径”标签，为安全相关评审设置了4小时的SLA。"}}, {"id": "bq-020", "category": "Handle Ambiguity", "question_en": "Describe a situation where there was no clear solution and you had to figure out what to do.", "question_cn": "描述一个没有清晰解决方案、你必须自己想办法的情况。", "answer_framework_en": {"situation": "Our CI system started failing intermittently — about 20% of builds would fail with a cryptic 'connection reset by peer' error, but re-running the same build would succeed. The error appeared randomly across different services and different build steps. No one on the team could reproduce it reliably.", "task": "I volunteered to debug this because it was wasting 4+ engineer-hours per day on retriggering builds. There was no clear cause, no stack trace pointing to specific code, and no documentation of similar issues.", "action": "I took a systematic approach. First, I instrumented our CI scripts to capture more context: network timing, process resource usage, and the exact error messages with timestamps. I collected data from 50 failing builds over 3 days. Analysis revealed a pattern: failures always occurred between 10:02-10:07 AM. I cross-referenced with our monitoring dashboard and found that our CI cluster's shared NFS mount ran daily maintenance backups at exactly 10:00 AM, causing a 5-second I/O freeze. The 'connection reset' was because the build agent couldn't write logs during the freeze. But wait — why did only 20% of builds fail? Further investigation showed that builds using larger Docker images (over 1GB) were the ones that timed out because they had more filesystem operations during the freeze window. I confirmed by running 10 builds with small images during the freeze — all passed.", "result": "I proposed and implemented two changes: (1) reschedule the NFS backup to midnight, and (2) add a retry mechanism in the CI agent with exponential backoff for transient I/O errors. After the NFS backup was rescheduled, the intermittent failures dropped to zero. The engineering time saved was roughly 20 hours per week across the team. The structured debugging approach I used was adopted as a template for other intermittent issues."}, "answer_framework_cn": {"situation": "我们的CI系统开始间歇性失败——大约20%的构建会报出一个隐晦的'connection reset by peer'错误，但重新运行同样的构建就能成功。错误随机出现在不同的服务和不同的构建步骤中。团队里没有人能稳定复现。", "task": "我主动请缨调试这个问题，因为它每天浪费4个以上的工程师工时在重新触发构建上。没有明确的原因，没有指向特定代码的堆栈跟踪，也没有类似问题的文档。", "action": "我采用了系统化方法。首先，我在CI脚本中添加了更多上下文的捕获：网络计时、进程资源使用情况、以及带时间戳的精确错误信息。我收集了3天内50次失败构建的数据。分析揭示了一个模式：失败总是在10:02-10:07之间发生。我交叉参考了监控面板，发现CI集群的共享NFS挂载点正好在10:00进行日常维护备份，导致5秒的I/O冻结。'连接重置'是因为构建代理在冻结期间无法写入日志。但为什么只有20%的构建失败呢？进一步调查显示，使用较大Docker镜像（超过1GB）的构建会超时，因为它们在冻结窗口内有更多的文件系统操作。我通过在冻结期间用小型镜像运行10次构建来验证——全部通过。", "result": "我提出并实施了两个改进：(1)将NFS备份重新安排到午夜，(2)为短暂I/O错误在CI代理中添加指数退避的重试机制。NFS备份重新安排后，间歇性失败降到了零。团队每周节省大约20个工程小时。我使用的结构化调试方法被采纳为其他间歇性问题的排查模板。"}}, {"id": "bq-021", "category": "Googleyness & Collaboration", "question_en": "Tell me about a time you worked with a difficult coworker. How did you handle the situation?", "question_cn": "描述一次你与难以相处的同事共事的经历。你是怎么处理的？", "answer_framework_en": {"situation": "A teammate consistently shot down others' ideas in design discussions using aggressive language like 'That will never work' and 'This is obviously wrong.' This created a climate where junior engineers stopped contributing ideas in meetings. I needed to work closely with him on a shared module.", "task": "I wanted to improve our collaboration and also, if possible, help change the team dynamic so others would feel safe contributing again.", "action": "I started by observing more carefully to understand his motivations. I noticed he was very technically sharp but had high standards that he applied equally to himself. His frustration came from seeing what he considered 'sloppy thinking,' not from wanting to dismiss people. In our 1:1 collaboration, I preempted his concerns by sending design docs ahead of meetings with explicit questions marked: 'These are the areas I'm least confident about — I'd love your sharpest critique here.' This gave him a channel to be rigorous without needing to interrupt. Separately, I introduced a design review format where each proposal started with a written doc, feedback was given as written comments first, and verbal discussion was reserved for unresolved items. This reduced the pressure of live critique.", "result": "Our direct collaboration improved significantly. He became one of my most valuable reviewers because his critiques were actually thorough and correct. The written-first design review format was adopted by the wider team. Junior engineers started contributing more once the live critique pressure was removed. The difficult coworker eventually moderated his tone after seeing how the written format led to better discussions."}, "answer_framework_cn": {"situation": "一位团队成员在设计讨论中总是用攻击性的语言否定别人的想法，比如'这永远行不通'和'这显然是错的'。这造成了一种氛围——初级工程师不敢在会议上发表意见。我需要和他密切合作一个共享模块。", "task": "我想改善我们的协作，同时如果可能的话，帮助改变团队氛围，让大家重新感到安全并能提出意见。", "action": "我先更仔细地观察以理解他的动机。我发现他技术非常敏锐，但对自己也要求极高。他的挫败感来自于看到他认为的'思维不严谨'，而不是想要否定别人。在我们1对1协作时，我提前预判了他的关注点：在开会前发送设计文档，并明确标出问题——'这些是我最不自信的地方，我希望得到你最犀利的批评。'这给了他一个严格把关的渠道而不需要打断别人。另外，我引入了一种设计评审格式：每个方案先从书面文档开始，反馈先以书面评论形式给出，口头讨论只留给未解决的问题。这减轻了现场批评的压力。", "result": "我们直接的协作有了显著改善。他成为我最有价值的评审者之一，因为他的批评实际上非常彻底和准确。书面先行的设计评审格式被整个团队采纳。一旦现场批评的压力消失，初级工程师开始更多地贡献意见。那位难相处的同事在看到书面形式如何带来更好的讨论后，也逐渐缓和了自己的语气。"}}, {"id": "bq-022", "category": "Innovation & Impact", "question_en": "How would you plan and deliver a new feature from scratch?", "question_cn": "假设你需要给一个产品添加一个新功能，你会如何规划？", "answer_framework_en": {"situation": "Our product team proposed adding a real-time collaboration feature to our document editor, similar to Google Docs multi-cursor support. This was a significant technical undertaking because our editor was built on a single-user operational transform model.", "task": "I needed to plan the feature end-to-end covering technical architecture, incremental delivery, risk mitigation, and cross-team coordination. The goal was to ship a usable initial version within 3 months.", "action": "I started with a Technical Design Doc covering: (1) backend: CRDT vs OT, conflict resolution strategy, WebSocket connection management; (2) frontend: cursor rendering, debouncing, optimistic updates; (3) data model: document state representation, change log format. I shared the doc for review with 5 engineers across frontend, backend, and infra teams. Based on feedback, I chose OT with a central server because our document size was small and team familiarity was higher. I then broke delivery into phases: Phase 1 (MVP within 4 weeks) — two users editing, basic cursor sync, no conflict handling. Phase 2 (6 weeks) — real-time save, conflict resolution, presence indicators. Phase 3 (12 weeks) — full multi-cursor, offline support, performance optimization. I flagged technical risks: WebSocket reconnection, memory leaks from cursor updates, and OT transformation edge cases.", "result": "The feature launched on schedule with Phase 1 released to internal dogfooders at week 4 for early feedback. The incremental approach allowed us to catch a critical OT bug during internal testing before external release. User adoption hit 40% of active users within the first month. The TDD process became the standard template for future feature planning in the team."}, "answer_framework_cn": {"situation": "产品团队提议为我们的文档编辑器添加实时协作功能，类似Google Docs的多光标支持。这是一个重大技术挑战，因为我们的编辑器是基于单用户操作转换模型构建的。", "task": "我需要端到端地规划这个功能，涵盖技术架构、增量交付、风险缓解和跨团队协调。目标是在3个月内交付一个可用的初始版本。", "action": "我首先编写了技术设计文档，涵盖：(1)后端：CRDT vs OT、冲突解决策略、WebSocket连接管理；(2)前端：光标渲染、防抖、乐观更新；(3)数据模型：文档状态表示、变更日志格式。我把文档发给5位跨前后端和基础设施团队的工程师评审。基于反馈，我选择了带中央服务器的OT方案，因为我们的文档小且团队更熟悉。然后我把交付分成阶段：阶段1（4周内MVP）——两人编辑、基本光标同步、无冲突处理。阶段2（6周）——实时保存、冲突解决、在线状态指示。阶段3（12周）——完整多光标、离线支持、性能优化。我标记了技术风险：WebSocket重连、光标更新的内存泄漏、OT转换的边界情况。", "result": "功能按计划上线，阶段1在第4周发布给内部试用者做早期反馈。增量方式让我们在对外发布前的内测阶段就发现了一个关键的OT bug。用户在第一个月内的采用率达到40%。TDD流程成为团队未来功能规划的标准模板。"}}, {"id": "bq-023", "category": "Googleyness & Collaboration", "question_en": "Tell me about a time you had to assign tasks to a team and they pushed back on your assignments.", "question_cn": "描述一次你需要给团队分配任务但团队成员对你的分配表示不满的经历。", "answer_framework_en": {"situation": "As the tech lead for a migration project, I assigned tasks for the upcoming sprint. I gave what I thought was the most interesting work (designing the new API) to a senior engineer and the more tedious work (data migration scripts) to two mid-level engineers. During the sprint planning, they pushed back, saying the work was unevenly distributed and unfair.", "task": "I needed to address the fairness concern while still ensuring the project moved forward on schedule. The data migration work was critical but not glamorous, and I had unintentionally created a perception of favoritism.", "action": "I paused the sprint planning and acknowledged their concern publicly: 'You're right, I didn't explain my reasoning and the distribution looks unfair.' I then transparently shared my thinking: I assigned the data migration to them because they knew the existing database schema better from previous work, not because I was favoring anyone. But I also admitted I hadn't considered that the data migration work had fewer learning opportunities. I proposed a rotation: they would own the data migration schema design (the interesting part) while the senior engineer would handle the runtime performance validation (the less glamorous part). I also committed to rotating interesting and tedious work more systematically going forward, and I created a task preference sheet where team members could indicate which types of work they wanted to grow in.", "result": "The team agreed to the adjusted plan. The mid-level engineers did excellent work on the schema design and learned a lot about database internals. The senior engineer provided valuable performance insights from the validation work. The task preference sheet became a permanent part of our sprint planning process, helping me distribute work more equitably in the future."}, "answer_framework_cn": {"situation": "作为迁移项目的技术负责人，我为即将到来的迭代分配了任务。我把我认为最有趣的工作（设计新API）给了一位资深工程师，把更繁琐的工作（数据迁移脚本）给了两位中级工程师。在迭代规划会上，他们提出反对，认为工作分配不均、不公平。", "task": "我需要解决公平性问题，同时确保项目按计划推进。数据迁移工作很关键但不光鲜，而我无意中造成了偏袒的印象。", "action": "我暂停了迭代规划，公开认可了他们的顾虑：“你们说得对，我没有解释我的理由，分配看起来确实不公平。”然后我透明地分享了想法：我把数据迁移分配给他们是因为他们更了解现有数据库模式，而不是偏袒谁。但我承认我没有考虑到数据迁移工作的学习机会较少。我提出了轮换：他们负责数据迁移的模式设计（有趣的部分），而资深工程师负责运行时性能验证（不那么光鲜的部分）。我还承诺以后更系统地进行有趣和繁琐工作的轮换，并创建了一个任务偏好表，让团队成员可以表明他们希望在哪些领域成长。", "result": "团队同意了调整后的方案。中级工程师在模式设计上做得非常出色，学到了很多数据库内部知识。资深工程师从验证工作中提供了宝贵的性能见解。任务偏好表成为我们迭代规划过程的永久组成部分，帮助我未来更公平地分配工作。"}}, {"id": "bq-024", "category": "Leadership & Ownership", "question_en": "How will you keep contributing and stay relevant at Google?", "question_cn": "你如何在谷歌工作期间保持持续贡献，不落后？", "answer_framework_en": {"situation": "At Google's scale and pace of change, the half-life of technical knowledge is short. Frameworks, tools, and best practices evolve rapidly. I've seen engineers stagnate when they rely on what they already know instead of continuously learning.", "task": "I need a systematic approach to keep growing and contributing at Google's level, not just maintaining what I already know.", "action": "I plan a three-pronged approach. First, learning infrastructure: I will set aside 5 hours per week for structured learning—reading internal design docs, attending tech talks, going through Google's legendary internal courses (like those for Borg, Spanner, MapReduce). I'll keep a learning log where I document one key technical insight per week. Second, contribution strategy: I will look for areas with high bus-factor (critical systems with few experts) and become a domain expert in one of those areas within my first year. I will intentionally take on one 'stretch' task per quarter that pushes me outside my comfort zone. Third, community building: I will participate in internal tech discussions, write design doc reviews for other teams, and contribute to Google's developer infrastructure by giving feedback on internal tools.", "result": "I believe this systematic approach — structured learning, deliberate stretch projects, and community engagement — is what separates engineers who thrive at Google from those who plateau. I want to be someone who, after 5 years at Google, has grown my scope and impact rather than just accumulated tenure."}, "answer_framework_cn": {"situation": "在Google的规模和变化速度下，技术知识的半衰期很短。框架、工具和最佳实践快速演进。我看到过工程师因为依赖已有知识而不是持续学习而停滞不前。", "task": "我需要一个系统性的方法在Google的水平上持续成长和贡献，而不是仅仅维持已有知识。", "action": "我计划一个三管齐下的方法。第一，学习基础设施：每周留出5小时进行结构化学习——阅读内部设计文档、参加技术讲座、学习Google传奇的内部课程（如Borg、Spanner、MapReduce等）。我会保持学习日志，每周记录一个关键技术见解。第二，贡献策略：我会寻找高bus-factor（关键但懂的人少的系统）的领域，在第一年内成为其中一个领域的领域专家。我会有意每季度承担一个超出舒适区的“拉伸”任务。第三，社区建设：参与内部技术讨论，为其他团队的代码评审提供帮助，通过反馈内部工具为Google的开发者基础设施做贡献。", "result": "我相信这种系统化的方法——结构化学习、有意的挑战项目和社区参与——是区分在Google蓬勃发展和平庸的工程师的关键。我希望成为在Google五年后范围影响不断扩大、而不仅仅是积累了年资的人。"}}, {"id": "bq-025", "category": "Handle Ambiguity", "question_en": "Tell me about a time a project changed direction midway. How did you adapt?", "question_cn": "描述一次项目中途改变方向的经历。你是如何适应的？", "answer_framework_en": {"situation": "Midway through building a customer-facing analytics dashboard, the product team decided to pivot from a self-serve analytics tool to an AI-powered insight generator. Half of our backend code (query builder, visualization engine) was no longer directly relevant to the new direction.", "task": "I needed to salvage as much of the existing work as possible while adapting to the new requirements, and keep the team motivated through the pivot.", "action": "I did a systematic audit of our existing codebase against the new requirements. I identified three categories: (1) directly reusable — the data pipeline and caching layer were unchanged; (2) adaptable — the visualization engine could be repurposed to render AI-generated insights instead of raw data; (3) deprecated — the query builder couldn't be reused. For the deprecated code, I made the hard call to delete it rather than keep it as dead weight. I re-estimated the remaining timeline accounting for the pivot, presented it to the PM, and negotiated a 2-week schedule extension. I re-assigned team members based on the new priorities: the engineer who built the query builder was the best fit for designing the prompt infrastructure. I held a team meeting to reframe the pivot positively — we weren't throwing away work, we were shifting from 'showing data' to 'telling users what the data means.'", "result": "The AI-powered dashboard shipped 3 weeks after the original deadline (1 week less than the initial extension request, thanks to the reusable components). User engagement with the dashboard was 3x higher than the old self-serve version. The team was energized by the new direction. The salvage-and-pivot audit became a standard step in our team's playbook when priorities shift."}, "answer_framework_cn": {"situation": "在构建面向客户的分析仪表板的过程中，产品团队决定从自助分析工具转向AI驱动的洞察生成器。我们的一半后端代码（查询构建器、可视化引擎）与新方向不再直接相关。", "task": "我需要尽可能挽救现有工作，同时适应新需求，并保持团队在转向过程中的积极性。", "action": "我对现有代码库做了系统审计，对照新需求。我识别出三类：(1)可直接重用——数据管道和缓存层不变；(2)可改造——可视化引擎可以重新用来渲染AI生成的洞察而非原始数据；(3)已废弃——查询构建器无法重用。对于废弃代码，我做出了艰难的决定：直接删除而不是保留为死代码。我重新估算了转向后的剩余时间线，呈现给产品经理，并协商了2周的工期延长。我根据新优先级重新分配了团队成员：构建查询构建器的工程师最适合设计提示词基础设施。我召开团队会议正面重新定义这次转向——我们不是在丢弃工作，而是从“展示数据”转向“告诉用户数据意味着什么”。", "result": "AI驱动的仪表板在原定截止日期后3周上线（比初始延期请求少了1周，得益于可重用组件）。用户对仪表板的参与度是旧自助版本的3倍。团队因新方向而充满活力。这套挽救与转向审计方法成为团队应对优先级变化时的标准步骤。"}}, {"id": "bq-026", "category": "Googleyness & Collaboration", "question_en": "Tell me about a time you went out of your way to help someone outside your team.", "question_cn": "描述一次你主动帮助团队以外的人的经历。", "answer_framework_en": {"situation": "A data science team was struggling with an ETL pipeline that kept failing at 3 AM due to memory issues in their Python processing script. They had no dedicated engineering support and had been struggling for two weeks, losing a day of data each time the pipeline crashed.", "task": "I was not assigned to help them. But I heard about their struggles in a company-wide Slack channel and had experience building similar data pipelines. I offered to help debug the issue.", "action": "I spent an evening reviewing their pipeline code. The root cause was clear: they were loading all data into memory before processing instead of using streaming. I refactored their core processing function to use generator-based streaming, processing records one at a time. I also set up a simple monitoring alert using the existing logging infrastructure to notify them if memory usage exceeded 70%. Beyond the code fix, I created a 3-page best-practices guide for writing ETL pipelines in Python, covering memory management, error handling, and idempotency. I walked through it with their team in a 30-minute session and gave them a template for future pipelines.", "result": "Their pipeline stopped crashing entirely. They recovered the previous two weeks' lost data using the new streaming approach applied to raw logs. The team was able to run independently without engineering support afterward. One of their data scientists later collaborated with my team on a cross-functional ML project. The best-practices guide was shared with other data science teams and became part of the company's data engineering onboarding."}, "answer_framework_cn": {"situation": "一个数据科学团队的ETL管道不断在凌晨3点因为Python处理脚本内存问题而崩溃。他们没有专门的工程支持，已经挣扎了两周，每次管道崩溃就丢失一天的数据。", "task": "我没有被分配去帮助他们。但我在公司全员的Slack频道听说他们的困境，而我有构建类似数据管道的经验。我主动提出帮忙调试。", "action": "我花了一个晚上审查他们的管道代码。根本原因很明显：他们在处理之前将所有数据加载到内存中，而不是使用流式处理。我重构了核心处理函数，使用基于生成器的流式处理，逐条处理记录。我还利用现有日志基础设施设置了一个简单的监控告警，当内存使用超过70%时通知他们。除了修代码，我创建了一份3页的Python ETL管道最佳实践指南，涵盖内存管理、错误处理和幂等性。我花30分钟和他们团队一起过了一遍，并给了他们未来管道的模板。", "result": "他们的管道完全不再崩溃。他们用新的流式方法处理原始日志，恢复了过去两周丢失的数据。此后这个团队可以在没有工程支持的情况下独立运行。其中一位数据科学家后来与我的团队合作了一个跨职能的ML项目。这份最佳实践指南被分享给其他数据科学团队，成为公司数据工程入职培训的一部分。"}}, {"id": "bq-027", "category": "Leadership & Ownership", "question_en": "Tell me about your greatest professional achievement or most successful project.", "question_cn": "描述你最成功或最有成就感的项目。", "answer_framework_en": {"situation": "I led the redesign of our notification service, which had become a bottleneck. Originally built as a quick MVP, it was sending 10 million+ notifications per day with 15% failure rates and no delivery tracking. Customer complaints about missing notifications were the #1 support ticket category.", "task": "I took ownership of this problem end-to-end: reduce failure rates to under 1%, add delivery tracking, and ensure the system could scale to 50 million notifications per day without increasing cost proportionally.", "action": "I started by analyzing three months of notification logs to categorize failure types. The main causes were: (1) provider timeout (40% of failures), (2) rate limiting (30%), (3) malformed payloads (20%), (4) others (10%). I implemented a multi-provider failover system with circuit breakers — if one provider timed out, the system automatically retried with the secondary provider within 100ms. I added a dead-letter queue with a retry dashboard for the support team to manually retry failed notifications. For rate limiting, I built a token bucket algorithm that smoothed out traffic spikes. I introduced delivery tracking with webhook callbacks and built a real-time monitoring dashboard. I also wrote idempotency guarantees into the API to handle duplicate sends safely.", "result": "Notification delivery rate improved from 85% to 99.8%. The system scaled to 80 million daily notifications with 50% less infrastructure cost due to optimized retry logic. Customer support tickets about missing notifications dropped by 90%. The project was recognized with the company's engineering excellence award that quarter. The multi-provider failover pattern was adopted by two other internal services."}, "answer_framework_cn": {"situation": "我主导了通知服务的重新设计，它已经成为了瓶颈。最初是作为快速MVP构建的，每天发送1000万+通知，失败率15%，没有投递追踪。客户关于遗漏通知的投诉是排名第一的工单类别。", "task": "我端到端地承担了这个问题的责任：将失败率降到1%以下，增加投递追踪，确保系统能在不按比例增加成本的情况下扩展到每天5000万通知。", "action": "我先分析了三个月的通知日志来分类失败类型。主要原因：(1)提供商超时（占40%），(2)频率限制（30%），(3)格式错误（20%），(4)其他（10%）。我实现了多提供商故障切换系统加断路器——如果一个提供商超时，系统在100ms内自动用备用提供商重试。我添加了死信队列和重试面板，供支持团队手动重试失败通知。针对频率限制，我构建了一个令牌桶算法来平滑流量峰值。我通过webhook回调引入了投递追踪并构建了实时监控面板。我还为API添加了幂等性保证来安全处理重复发送。", "result": "通知投递率从85%提升到99.8%。系统扩展到每天8000万通知，基础设施成本降低了50%，得益于优化的重试逻辑。关于遗漏通知的客户投诉减少了90%。该项目获得了该季度的公司工程卓越奖。多提供商故障切换模式被另外两个内部服务采用。"}}];

let currentTab = 'leetcode';
let leetCodeView = 'freq';
let currentItemId = null;
let currentLang = 'en';
let listFilter = '30d';
let diffFilter = 'all';
let searchQuery = '';
let activeTags = [];

const STORAGE_KEY = 'google-interview-progress-v2';
let checked = {};
try {
  const s = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  if (Array.isArray(s)) s.forEach(x => { checked[x] = true; });
  else checked = s;
} catch(e) { checked = {}; }

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(checked));
  updateStats();
}

function toggleCheck(id) {
  if (checked[id]) delete checked[id];
  else checked[id] = true;
  save();
  syncCheckboxes(id);
}

function syncCheckboxes(id) {
  const st = checked[id] || false;
  document.querySelectorAll('input[data-id="' + id + '"]').forEach(function(cb) { cb.checked = st; });
  document.querySelectorAll('.problem-item[data-id="' + id + '"]').forEach(function(el) { el.classList.toggle('done', st); });
  if (currentItemId === id) document.getElementById('sidebarCheckbox').checked = st;
  updateStats();
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  document.querySelector('.tab[data-tab="' + tab + '"]').classList.add('active');
  currentItemId = null;
  closeSidebar();
  renderCurrent();
}

function openSidebar(id, data) {
  currentItemId = id;
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('overlay').classList.add('open');
  document.getElementById('sidebarTitle').textContent = data.title_en || data.question_en || data.title || '';
  document.getElementById('sidebarCheckbox').checked = checked[id] || false;

  var langToggle = document.getElementById('langToggle');
  var body = document.getElementById('sidebarBody');
  var html = '';

  if (data.description_en) {
    langToggle.style.display = 'flex';
    currentLang = 'en';
    document.querySelectorAll('.lang-btn').forEach(function(b) { b.classList.remove('active'); });
    var enBtn = document.querySelector('.lang-btn[onclick*="en"]');
    if (enBtn) enBtn.classList.add('active');
    var tags = (data.tags || []).map(function(t) { return '<span class="tag">' + t + '</span>'; }).join(' ');
    html = (tags ? '<div style="margin-bottom:10px">' + tags + '</div>' : '') +
      '<h4 class="en-text">Problem Description</h4>' +
      '<h4 class="cn-text">题目描述</h4>' +
      '<p class="en-text">' + escHtml(data.description_en || '') + '</p>' +
      '<p class="cn-text">' + escHtml(data.description_cn || '') + '</p>' +
      '<h4 class="en-text">Solution Approach</h4>' +
      '<h4 class="cn-text">解题思路</h4>' +
      '<p class="en-text">' + escHtml(data.solution_en || '') + '</p>' +
      '<p class="cn-text">' + escHtml(data.solution_cn || '') + '</p>' +
      '<h4>Python Code</h4>' +
      '<pre class="code-block">' + highlightCode(data.python_code || '# No code') + '</pre>' +
      '<p style="font-size:11px;color:var(--text2);margin-top:6px">Complexity: ' + escHtml(data.complexity || 'N/A') + '</p>';
    body.className = 'sidebar-body lang-en';
  } else if (data.answer_framework_en) {
    langToggle.style.display = 'flex';
    currentLang = 'en';
    document.querySelectorAll('.lang-btn').forEach(function(b) { b.classList.remove('active'); });
    var enBtn2 = document.querySelector('.lang-btn[onclick*="en"]');
    if (enBtn2) enBtn2.classList.add('active');
    html = '<span class="tag" style="margin-bottom:10px;display:inline-block">' + escHtml(data.category || 'General') + '</span>' +
      '<h4 class="en-text">Question</h4>' +
      '<h4 class="cn-text">问题</h4>' +
      '<p class="en-text">' + escHtml(data.question_en || '') + '</p>' +
      '<p class="cn-text">' + escHtml(data.question_cn || '') + '</p>' +
      '<h4 class="en-text">Answer Framework (STAR)</h4>' +
      '<h4 class="cn-text">回答框架 (STAR)</h4>' +
      renderSTAR(data.answer_framework_en, 'en') +
      renderSTAR(data.answer_framework_cn, 'cn');
    body.className = 'sidebar-body lang-en';
  } else {
    langToggle.style.display = 'none';
    html = '<p><strong>Difficulty:</strong> ' + escHtml(data.difficulty || '?') + '</p>' +
      '<p><strong>Acceptance:</strong> ' + escHtml(data.acceptance || '?') + '</p>' +
      '<p><strong>Lists:</strong> ' + ((data.lists || []).join(', ')) + '</p>' +
      '<p><a href="' + (data.url || '#') + '" target="_blank" style="color:var(--accent)">Open on LeetCode</a></p>';
    body.className = 'sidebar-body';
  }

  body.innerHTML = html;
  document.querySelectorAll('.problem-item.active').forEach(function(el) { el.classList.remove('active'); });
  var item = document.querySelector('.problem-item[data-id="' + id + '"]');
  if (item) item.classList.add('active');
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
  document.querySelectorAll('.problem-item.active').forEach(function(el) { el.classList.remove('active'); });
  currentItemId = null;
}

function toggleSidebarCheck() {
  if (currentItemId) toggleCheck(currentItemId);
}

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(function(b) { b.classList.remove('active'); });
  var btn = document.querySelector('.lang-btn[onclick*="' + lang + '"]');
  if (btn) btn.classList.add('active');
  document.getElementById('sidebarBody').className = 'sidebar-body lang-' + lang;
}

function renderSTAR(framework, lang) {
  if (typeof framework === 'string') {
    return '<p class="' + lang + '-text" style="white-space:pre-wrap">' + escHtml(framework) + '</p>';
  }
  var labels = lang === 'en' ? ['Situation', 'Task', 'Action', 'Result'] : ['情境', '任务', '行动', '结果'];
  var keys = ['situation', 'task', 'action', 'result'];
  var html = '';
  for (var i = 0; i < keys.length; i++) {
    if (framework[keys[i]]) {
      html += '<div style="margin-bottom:10px" class="' + lang + '-text">' +
        '<strong style="color:var(--accent)">' + labels[i] + ':</strong> ' +
        '<span>' + escHtml(framework[keys[i]]) + '</span></div>';
    }
  }
  return html;
}

function highlightCode(code) {
  return escHtml(code || '')
    .replace(/(#.*$)/gm, '<span class="comment">$1</span>')
    .replace(/(\bdef\b|\bclass\b|\breturn\b|\bif\b|\belse\b|\belif\b|\bfor\b|\bwhile\b|\bin\b|\bnot\b|\band\b|\bor\b|\bimport\b|\bfrom\b|\bwith\b|\btry\b|\bexcept\b|\braise\b|\bTrue\b|\bFalse\b|\bNone\b|\blambda\b|\byield\b|\bpass\b|\bbreak\b|\bcontinue\b|\bglobal\b|\bnonlocal\b|\bself\b|\bassert\b|\bdel\b)/g, '<span class="keyword">$1</span>')
    .replace(/(\b\d+\b)/g, '<span class="number">$1</span>')
    .replace(/(\bprint\b|\blen\b|\brange\b|\benumerate\b|\bzip\b|\bmap\b|\bfilter\b|\bsorted\b|\breversed\b|\bmin\b|\bmax\b|\bsum\b|\babs\b|\blist\b|\bdict\b|\bset\b|\btuple\b|\bint\b|\bstr\b|\bbool\b|\bfloat\b|\btype\b|\bisinstance\b|\bhasattr\b|\bgetattr\b|\bsetattr\b|\bany\b|\ball\b)/g, '<span class="builtin">$1</span>')
    .replace(/(@\w+)/g, '<span class="decorator">$1</span>');
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function listBadges(p) {
  var h = '<span class="list-badges">';
  if (p.lists && p.lists.indexOf('30d') >= 0) h += '<span class="list-badge d30">30d</span>';
  if (p.lists && p.lists.indexOf('3m') >= 0) h += '<span class="list-badge d3m">3m</span>';
  if (p.lists && p.lists.indexOf('6m') >= 0) h += '<span class="list-badge d6m">6m</span>';
  return h + '</span>';
}

// ===== LEETCODE =====
function getLCFiltered() {
  var data = LC_DATA.slice();
  if (listFilter !== 'all') data = data.filter(function(p) { return p.lists.indexOf(listFilter) >= 0; });
  if (diffFilter !== 'all') data = data.filter(function(p) { return p.difficulty === diffFilter; });
  if (searchQuery) {
    var q = searchQuery.toLowerCase();
    data = data.filter(function(p) { return p.title.toLowerCase().indexOf(q) >= 0 || p.slug.indexOf(q) >= 0 || String(p.num).indexOf(q) >= 0; });
  }
  return data;
}

function getLCFreqRank(p) {
  if (listFilter === '30d') return p.freq_ranks['30d'] || 999;
  if (listFilter === '3m') return p.freq_ranks['3m'] || 999;
  return p.freq_ranks['6m'] || 999;
}

function renderLeetCode() {
  var filtered = getLCFiltered();
  var container = document.getElementById('container');
  var html = '';

  if (leetCodeView === 'freq') {
    filtered.sort(function(a,b) { return getLCFreqRank(a) - getLCFreqRank(b); });
    for (var i = 0; i < filtered.length; i++) {
      var p = filtered[i];
      var rank = getLCFreqRank(p);
      var done = checked[p.slug] || false;
      var bar = rank <= 30 ? '\u{1F525}' : rank <= 70 ? '\u{2B50}' : '';
      html += '<div class="problem-item' + (done ? ' done' : '') + '" data-id="' + p.slug + '">' +
        '<input type="checkbox" data-id="' + p.slug + '" ' + (done ? 'checked' : '') + '>' +
        '<span class="freq-rank">' + bar + ' #' + rank + '</span>' +
        '<span class="item-num">' + (p.num===9999?'-':p.num+'.') + '</span>' +
        '<span class="item-title">' + escHtml(p.title) + '</span>' +
        listBadges(p) +
        '<span class="diff-badge ' + p.difficulty + '">' + p.difficulty + '</span>' +
        '<span class="accept">' + p.acceptance + '</span>' +
        '<span class="click-hint">&gt;</span></div>';
    }
  } else {
    var groups = {};
    for (var i = 0; i < filtered.length; i++) {
      var cats = filtered[i].categories || ['Other'];
      for (var j = 0; j < cats.length; j++) {
        if (!groups[cats[j]]) groups[cats[j]] = [];
        groups[cats[j]].push(filtered[i]);
      }
    }
    var catNames = Object.keys(groups).sort(function(a,b) { return groups[b].length - groups[a].length; });
    for (var ci = 0; ci < catNames.length; ci++) {
      var cat = catNames[ci];
      var items = groups[cat].sort(function(a,b) {
        var da = a.difficulty==='Hard'?0:a.difficulty==='Medium'?1:2;
        var db = b.difficulty==='Hard'?0:b.difficulty==='Medium'?1:2;
        return da!==db ? da-db : a.num-b.num;
      });
      var doneCount = items.filter(function(p) { return checked[p.slug]; }).length;
      html += '<div class="topic-section"><div class="topic-header" onclick="this.nextElementSibling.classList.toggle(\'collapsed\')">' +
        '<span>' + cat + '</span><span class="topic-count">' + items.length + ' (' + doneCount + ' done)</span>' +
        '<span style="margin-left:auto;font-size:11px;color:var(--text2)">▼</span></div><div class="topic-problems">';
      for (var ii = 0; ii < items.length; ii++) {
        var p = items[ii];
        var done = checked[p.slug] || false;
        html += '<div class="problem-item' + (done?' done':'') + '" data-id="' + p.slug + '">' +
          '<input type="checkbox" data-id="' + p.slug + '" ' + (done?'checked':'') + '>' +
          '<span class="item-num">' + (p.num===9999?'-':p.num+'.') + '</span>' +
          '<span class="item-title">' + escHtml(p.title) + '</span>' +
          listBadges(p) +
          '<span class="diff-badge ' + p.difficulty + '">' + p.difficulty + '</span>' +
          '<span class="accept">' + p.acceptance + '</span></div>';
      }
      html += '</div></div>';
    }
  }
  container.innerHTML = html || '<div class="zero-state">No problems match</div>';

  var done = filtered.filter(function(p) { return checked[p.slug]; }).length;
  var pct = filtered.length ? done/filtered.length*100 : 0;
  document.getElementById('lcProgressBar').style.width = pct + '%';
  document.getElementById('lcProgressText').textContent = done + '/' + filtered.length;
}

function setLCView(view, el) {
  leetCodeView = view;
  document.querySelectorAll('#toolbar .filter-group:first-child .pill').forEach(function(p) { p.classList.remove('active'); });
  el.classList.add('active');
  renderLeetCode();
}

function setLCList(filter, el) {
  listFilter = filter;
  document.querySelectorAll('#toolbar .filter-group:nth-child(2) .pill').forEach(function(p) { p.classList.remove('active'); });
  el.classList.add('active');
  renderCurrent();
}

function setLCDiff(filter, el) {
  diffFilter = filter;
  document.querySelectorAll('#toolbar .filter-group:nth-child(3) .pill').forEach(function(p) { p.classList.remove('active'); });
  el.classList.add('active');
  renderCurrent();
}

function setLCSearch(q) { searchQuery = q; renderCurrent(); }

// ===== REAL QUESTIONS =====
var realDiff = 'all';
var realSearch = '';
var realTagFilter = '';

function setRealDiff(f, el) {
  realDiff = f;
  document.querySelectorAll('#toolbar .filter-group:first-child .pill').forEach(function(p) { p.classList.remove('active'); });
  el.classList.add('active');
  renderRealQuestions();
}

function setRealSearch(q) { realSearch = q; renderRealQuestions(); }

function setRealTag(tag) {
  realTagFilter = realTagFilter === tag ? '' : tag;
  renderRealQuestions();
}

function renderRealQuestions() {
  var data = REAL_DATA.slice();
  if (realDiff !== 'all') data = data.filter(function(p) { return (p.difficulty || 'Medium') === realDiff; });
  if (realSearch) {
    var q = realSearch.toLowerCase();
    data = data.filter(function(p) { return (p.title_en||'').toLowerCase().indexOf(q) >= 0 || (p.title_cn||'').indexOf(q) >= 0 || (p.tags||[]).some(function(t){return t.toLowerCase().indexOf(q)>=0}); });
  }
  if (realTagFilter) data = data.filter(function(p) { return (p.tags||[]).indexOf(realTagFilter) >= 0; });

  var html = '';
  for (var i = 0; i < data.length; i++) {
    var p = data[i];
    var done = checked[p.id] || false;
    html += '<div class="problem-item' + (done?' done':'') + '" data-id="' + p.id + '">' +
      '<input type="checkbox" data-id="' + p.id + '" ' + (done?'checked':'') + '>' +
      '<span class="item-num">#' + (p.id||'').split('-')[1] + '</span>' +
      '<span class="item-title">' + escHtml(p.title_en || '') + ' / ' + escHtml(p.title_cn || '') + '</span>' +
      (p.tags||[]).slice(0,3).map(function(t){return '<span class="tag">'+t+'</span>'}).join('') +
      '<span class="click-hint">&gt; Click for solution</span></div>';
  }
  document.getElementById('container').innerHTML = html || '<div class="zero-state">No real questions match filters</div>';

  var allTags = new Set();
  REAL_DATA.forEach(function(p) { (p.tags||[]).forEach(function(t) { allTags.add(t); }); });
  document.getElementById('tagPills').innerHTML = Array.from(allTags).sort().map(function(t) {
    return '<span class="tag-pill' + (realTagFilter===t?' active':'') + '" onclick="setRealTag(\'' + t.replace(/'/g,"\\'") + '\')">' + t + '</span>';
  }).join('');

  var done = REAL_DATA.filter(function(p) { return checked[p.id]; }).length;
  var pct = REAL_DATA.length ? done/REAL_DATA.length*100 : 0;
  document.getElementById('realProgressBar').style.width = pct + '%';
  document.getElementById('realProgressText').textContent = done + '/' + REAL_DATA.length;
}

// ===== BQ =====
var bqCat = 'all';
var bqSearch = '';

function setBQCat(cat, el) {
  bqCat = cat;
  document.querySelectorAll('#toolbar .filter-group .pill').forEach(function(p) { p.classList.remove('active'); });
  if (el) el.classList.add('active');
  else {
    var first = document.querySelector('#toolbar .filter-group .pill:first-child');
    if (first) first.classList.add('active');
  }
  renderBQ();
}

function setBQSearch(q) { bqSearch = q; renderBQ(); }

function renderBQ() {
  var data = BQ_DATA.slice();
  if (bqCat !== 'all') data = data.filter(function(q) { return q.category === bqCat; });
  if (bqSearch) {
    var q = bqSearch.toLowerCase();
    data = data.filter(function(x) { return (x.question_en||'').toLowerCase().indexOf(q) >= 0 || (x.question_cn||'').indexOf(q) >= 0; });
  }

  var groups = {};
  data.forEach(function(q) {
    var cat = q.category || 'General';
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(q);
  });

  var html = '';
  var catNames = Object.keys(groups);
  for (var ci = 0; ci < catNames.length; ci++) {
    var cat = catNames[ci];
    var items = groups[cat];
    var doneCount = items.filter(function(q) { return checked[q.id]; }).length;
    html += '<div class="bq-category"><div class="bq-cat-header" onclick="this.nextElementSibling.classList.toggle(\'collapsed\')">' +
      '<span>' + cat + '</span><span class="topic-count">' + items.length + ' (' + doneCount + ' done)</span>' +
      '<span style="margin-left:auto;font-size:11px;color:var(--text2)" class="bq-cat-arrow">▼</span></div><div class="bq-cat-body">';
    for (var ii = 0; ii < items.length; ii++) {
      var q = items[ii];
      var done = checked[q.id] || false;
      html += '<div class="problem-item' + (done?' done':'') + '" data-id="' + q.id + '">' +
        '<input type="checkbox" data-id="' + q.id + '" ' + (done?'checked':'') + '>' +
        '<span class="item-title">' + escHtml(q.question_en || q.question_cn || '') + '</span>' +
        '<span class="click-hint">&gt;</span></div>';
    }
    html += '</div></div>';
  }
  document.getElementById('container').innerHTML = html || '<div class="zero-state">No BQ questions match filters</div>';

  var done = BQ_DATA.filter(function(q) { return checked[q.id]; }).length;
  var pct = BQ_DATA.length ? done/BQ_DATA.length*100 : 0;
  document.getElementById('bqProgressBar').style.width = pct + '%';
  document.getElementById('bqProgressText').textContent = done + '/' + BQ_DATA.length;
}

// ===== TOOLBAR RENDERING =====
function renderLeetCodeToolbar() {
  return '<div class="filter-group"><label>View:</label>' +
    '<span class="pill active" onclick="setLCView(\'freq\', this)">Frequency</span>' +
    '<span class="pill" onclick="setLCView(\'topic\', this)">Topic</span></div>' +
    '<div class="filter-group"><label>List:</label>' +
    '<span class="pill active flag-30d" onclick="setLCList(\'30d\', this)">30d</span>' +
    '<span class="pill" onclick="setLCList(\'3m\', this)">3m</span>' +
    '<span class="pill" onclick="setLCList(\'all\', this)">All (6m)</span></div>' +
    '<div class="filter-group"><label>Diff:</label>' +
    '<span class="pill active" onclick="setLCDiff(\'all\', this)">All</span>' +
    '<span class="pill" onclick="setLCDiff(\'Easy\', this)">Easy</span>' +
    '<span class="pill" onclick="setLCDiff(\'Medium\', this)">Medium</span>' +
    '<span class="pill" onclick="setLCDiff(\'Hard\', this)">Hard</span></div>' +
    '<input class="search-box" placeholder="Search..." oninput="setLCSearch(this.value)">' +
    '<div class="progress-wrap"><div class="progress-bar-wrap"><div class="progress-bar" id="lcProgressBar"></div></div>' +
    '<span class="progress-text" id="lcProgressText">0/0</span></div>';
}

function renderRealToolbar() {
  return '<div class="filter-group"><label>Diff:</label>' +
    '<span class="pill active" onclick="setRealDiff(\'all\', this)">All</span>' +
    '<span class="pill" onclick="setRealDiff(\'Easy\', this)">Easy</span>' +
    '<span class="pill" onclick="setRealDiff(\'Medium\', this)">Medium</span>' +
    '<span class="pill" onclick="setRealDiff(\'Hard\', this)">Hard</span></div>' +
    '<input class="search-box" placeholder="Search..." oninput="setRealSearch(this.value)">' +
    '<div class="progress-wrap"><div class="progress-bar-wrap"><div class="progress-bar" id="realProgressBar"></div></div>' +
    '<span class="progress-text" id="realProgressText">0/0</span></div>';
}

function renderBQToolbar() {
  var cats = [];
  BQ_DATA.forEach(function(q) { if (cats.indexOf(q.category) < 0) cats.push(q.category); });
  var catPills = cats.map(function(c) { return '<span class="pill" onclick="setBQCat(\'' + c.replace(/'/g,"\\'") + '\', this)">' + c + '</span>'; }).join('');
  return '<div class="filter-group"><label>Category:</label>' +
    '<span class="pill active" onclick="setBQCat(\'all\', this)">All</span>' + catPills + '</div>' +
    '<input class="search-box" placeholder="Search BQ..." oninput="setBQSearch(this.value)">' +
    '<div class="progress-wrap"><div class="progress-bar-wrap"><div class="progress-bar" id="bqProgressBar"></div></div>' +
    '<span class="progress-text" id="bqProgressText">0/0</span></div>';
}

// ===== MAIN RENDER & EVENT DELEGATION =====
function renderCurrent() {
  var toolbar = document.getElementById('toolbar');
  var tagPills = document.getElementById('tagPills');

  if (currentTab === 'leetcode') {
    toolbar.innerHTML = renderLeetCodeToolbar();
    tagPills.style.display = 'flex';
    renderLeetCode();
  } else if (currentTab === 'real') {
    toolbar.innerHTML = renderRealToolbar();
    tagPills.style.display = 'flex';
    renderRealQuestions();
  } else if (currentTab === 'bq') {
    toolbar.innerHTML = renderBQToolbar();
    tagPills.style.display = 'none';
    renderBQ();
  }
  updateStats();
}

function updateStats() {
  var total = Object.keys(checked).length;
  document.getElementById('headerStats').textContent = '| Checked: ' + total;
}

function exportProgress() {
  var idToTitle = {};
  LC_DATA.forEach(function(d) { idToTitle[d.slug] = d.title; });
  REAL_DATA.forEach(function(d) { idToTitle[d.id] = d.title_en || d.id; });
  BQ_DATA.forEach(function(d) { idToTitle[d.id] = d.question_en || d.id; });

  var lines = Object.keys(checked).map(function(id) {
    return '[x] ' + (idToTitle[id] || id);
  });

  var blob = new Blob(['Google Interview Progress\\nDate: ' + new Date().toISOString().slice(0,10) + '\\nTotal: ' + lines.length + '\\n\\n' + lines.join('\\n')], {type:'text/plain'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'google-interview-progress.txt';
  a.click();
}

function resetProgress() {
  if (confirm('Delete ALL progress? This cannot be undone.')) {
    checked = {};
    localStorage.removeItem(STORAGE_KEY);
    renderCurrent();
  }
}

// Event delegation for problem item clicks (sidebar) and checkbox clicks
document.addEventListener('DOMContentLoaded', function() {
  renderCurrent();

  // Sidebar click delegation
  document.getElementById('container').addEventListener('click', function(e) {
    // Ignore checkbox clicks
    if (e.target.tagName === 'INPUT') return;
    
    var item = e.target.closest('.problem-item');
    if (!item) return;
    
    var id = item.getAttribute('data-id');
    if (!id) return;
    
    var data = null;
    if (currentTab === 'leetcode') {
      data = LC_DATA.find(function(x) { return x.slug === id; });
    } else if (currentTab === 'real') {
      data = REAL_DATA.find(function(x) { return x.id === id; });
    } else if (currentTab === 'bq') {
      data = BQ_DATA.find(function(x) { return x.id === id; });
    }
    if (data) openSidebar(id, data);
  });

  // Checkbox delegation
  document.getElementById('container').addEventListener('change', function(e) {
    if (e.target.type === 'checkbox') {
      var id = e.target.getAttribute('data-id');
      if (id) toggleCheck(id);
    }
  });
});

document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeSidebar(); });

</script>
